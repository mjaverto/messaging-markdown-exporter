name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags-ignore: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only. PR runs from forks must never get a token
# with write scope.
permissions:
  contents: read

jobs:
  lint-build-test:
    name: Lint, Build, Test
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test (unit)
        run: npm test

      - name: Test (E2E)
        run: npm run test:e2e
