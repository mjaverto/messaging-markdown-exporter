name: Release

on:
  push:
    branches: [main]
    # Don't burn a publish + provenance signature on doc-only commits.
    # Workflow changes still publish (kept out of the ignore list) so
    # that CI fixes ship immediately instead of waiting for code change.
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Bump version and publish
    runs-on: macos-latest
    timeout-minutes: 25
    # Least-privilege: scope write permissions to this job only so
    # other jobs added to this workflow inherit the default read-only.
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Skip if release commit
        id: skip_check
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          first_line="${HEAD_MSG%%$'\n'*}"
          if [[ "$first_line" == chore\(release\):* ]] || [[ "$first_line" == *"[skip ci]"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release: commit is a release/skip-ci commit."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
          always-auth: true

      - name: Install dependencies
        if: steps.skip_check.outputs.skip != 'true'
        run: npm ci

      - name: Lint (typecheck)
        if: steps.skip_check.outputs.skip != 'true'
        run: npm run lint

      - name: Build
        if: steps.skip_check.outputs.skip != 'true'
        run: npm run build

      - name: Test
        if: steps.skip_check.outputs.skip != 'true'
        run: npm test

      - name: Test (E2E against built CLI)
        if: steps.skip_check.outputs.skip != 'true'
        run: npm run test:e2e

      - name: Configure git identity
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        if: steps.skip_check.outputs.skip != 'true'
        id: bump
        run: |
          new_version=$(npm version patch --no-git-tag-version)
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${new_version}"

      - name: Commit bump
        if: steps.skip_check.outputs.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"

      - name: Push bump commit (retry with rebase on race)
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          # Another push may land on main between our checkout and push.
          # Rebase our single bump commit on top and retry a few times.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; pulling with rebase and retrying..."
            git fetch origin main
            git pull --rebase origin main
          done
          echo "Push failed after 5 attempts; aborting release."
          exit 1

      - name: Verify tarball contents (npm pack --dry-run)
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          # Catch a broken `files` array / misconfigured `.npmignore`
          # BEFORE we publish — otherwise we ship an empty or incomplete
          # tarball under the `latest` tag and burn a version number.
          set -euo pipefail
          pack_output=$(npm pack --dry-run --json)
          echo "${pack_output}"
          file_count=$(echo "${pack_output}" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const j=JSON.parse(s);console.log(j[0]?.files?.length ?? 0)})")
          if [[ "${file_count}" == "0" ]]; then
            echo "::error::npm pack --dry-run reports 0 files; aborting publish."
            exit 1
          fi
          echo "npm pack --dry-run: ${file_count} file(s) will be published."

      - name: Publish to npm (OIDC trusted publisher, with provenance)
        if: steps.skip_check.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Prefers npm OIDC trusted publishing when configured on npmjs.com.
          # Falls back to NPM_TOKEN auth if a token is present in the env.
          # See: https://docs.npmjs.com/trusted-publishers
          #
          # Recovery note: if this step fails the bump commit is already
          # on `main` but no tag is created and no GitHub Release is
          # published. To recover, either (a) re-run this workflow after
          # fixing the underlying issue — the next run will skip because
          # the head commit is `chore(release):` — so instead (b)
          # manually `npm publish` the already-bumped package and then
          # `git tag <version> && git push origin <version>` plus a
          # `gh release create <version> --generate-notes`.
          npm publish --access public --provenance

      - name: Tag release (only after successful publish)
        if: steps.skip_check.outputs.skip != 'true'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git tag "${NEW_VERSION}"
          git push origin "${NEW_VERSION}"

      - name: Create GitHub Release
        if: steps.skip_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          gh release create "${NEW_VERSION}" \
            --title "${NEW_VERSION}" \
            --generate-notes
